name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync backend dependencies (locked)
        run: uv sync --python 3.11 --extra server --extra test --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy -p agent_orchestrator

      - name: Test (pytest)
        run: uv run pytest -q
